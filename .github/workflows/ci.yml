name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: black --check .
      - run: mypy app

  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: ci-test-secret-not-for-production
      ADMIN_DATABASE_URL: postgresql://accesshub:accesshub@localhost:5432/postgres
      TEST_DATABASE_URL: postgresql+asyncpg://accesshub:accesshub@localhost:5432/accesshub_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: accesshub
          POSTGRES_PASSWORD: accesshub
          POSTGRES_DB: accesshub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U accesshub"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: pytest --cov=app --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t accesshub:ci .
